<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maze Game</title>
  <!-- Viewport for mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }
    #mazeCanvas {
      border: 1px solid black;
      margin-top: 20px;
      max-width: 600px; /* optional limit for larger screens */
      width: 100%;      /* responsive */
      height: auto;     /* keeps aspect ratio */
      touch-action: none; /* Prevents scrolling/refresh gestures on mobile */
    }
    #message {
      margin-top: 10px;
      font-weight: bold;
      color: red;
    }
    #restartBtn {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Maze Game</h1>
  <!-- Explicitly set canvas size -->
  <canvas id="mazeCanvas" width="400" height="400"></canvas>
  <div id="message"></div>
  <button id="restartBtn">Restart</button>

  <script>
    const canvas = document.getElementById("mazeCanvas");
    const ctx = canvas.getContext("2d");
    const message = document.getElementById("message");
    const restartBtn = document.getElementById("restartBtn");

    // Use fixed size for scaling
    const scale = canvas.width / 400;

    let drawing = false;
    let gameOver = false;
    let lastX = null;
    let lastY = null;

    function drawMaze() {
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "black";
      // Outer border
      ctx.fillRect(0, 0, 400 * scale, 10 * scale);
      ctx.fillRect(0, 0, 10 * scale, 400 * scale);
      ctx.fillRect(390 * scale, 0, 10 * scale, 400 * scale);
      ctx.fillRect(0, 390 * scale, 400 * scale, 10 * scale);

      // Maze layout
      ctx.fillRect(40 * scale, 40 * scale, 320 * scale, 10 * scale);
      ctx.fillRect(40 * scale, 80 * scale, 280 * scale, 10 * scale);
      ctx.fillRect(80 * scale, 120 * scale, 280 * scale, 10 * scale);
      ctx.fillRect(40 * scale, 160 * scale, 280 * scale, 10 * scale);
      ctx.fillRect(80 * scale, 200 * scale, 280 * scale, 10 * scale);
      ctx.fillRect(40 * scale, 240 * scale, 280 * scale, 10 * scale);
      ctx.fillRect(80 * scale, 280 * scale, 280 * scale, 10 * scale);
      ctx.fillRect(40 * scale, 320 * scale, 320 * scale, 10 * scale);

      // Vertical walls
      ctx.fillRect(80 * scale, 40 * scale, 10 * scale, 280 * scale);
      ctx.fillRect(160 * scale, 80 * scale, 10 * scale, 240 * scale);
      ctx.fillRect(240 * scale, 40 * scale, 10 * scale, 280 * scale);
      ctx.fillRect(320 * scale, 80 * scale, 10 * scale, 240 * scale);

      // Extra blockers
      ctx.fillRect(120 * scale, 160 * scale, 10 * scale, 80 * scale);
      ctx.fillRect(200 * scale, 200 * scale, 10 * scale, 80 * scale);
      ctx.fillRect(280 * scale, 120 * scale, 10 * scale, 80 * scale);

      // Entrance and exit (wider openings)
      ctx.clearRect(0, 0, 40 * scale, 40 * scale);           // entrance
      ctx.clearRect(360 * scale, 360 * scale, 40 * scale, 40 * scale); // exit
    }

    drawMaze();

    function getPixelColor(x, y) {
      const pixel = ctx.getImageData(x, y, 1, 1).data;
      return { r: pixel[0], g: pixel[1], b: pixel[2] };
    }

    function handleDraw(x, y) {
      if (gameOver) return;

      const color = getPixelColor(x, y);
      if (color.r === 0 && color.g === 0 && color.b === 0) {
        message.textContent = "Oops! You hit a wall. Restart to try again.";
        gameOver = true;
        drawing = false;
        restartBtn.style.display = "inline";
        lastX = null;
        lastY = null;
        return;
      }

      ctx.strokeStyle = "blue";
      ctx.lineWidth = 3 * scale;
      ctx.lineCap = "round";

      if (lastX !== null && lastY !== null) {
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(x, y, 2 * scale, 0, Math.PI * 2);
        ctx.fillStyle = "blue";
        ctx.fill();
      }

      lastX = x;
      lastY = y;

      if (x > 360 * scale && y > 360 * scale) {
        window.location.href = "address.html";
      }
    }

    // Mouse controls
    canvas.addEventListener("mousedown", e => {
      drawing = true;
      handleDraw(e.offsetX, e.offsetY);
    });
    canvas.addEventListener("mousemove", e => {
      if (drawing) handleDraw(e.offsetX, e.offsetY);
    });
    canvas.addEventListener("mouseup", () => {
      drawing = false;
      lastX = null;
      lastY = null;
    });

    // Touch controls
    canvas.addEventListener("touchstart", e => {
      e.preventDefault(); // prevent scroll/refresh
      drawing = true;
      const rect = canvas.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      const y = e.touches[0].clientY - rect.top;
      handleDraw(x, y);
    }, { passive: false });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault(); // prevent scroll/refresh
      if (!drawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.touches[0].clientX - rect.left;
      const y = e.touches[0].clientY - rect.top;
      handleDraw(x, y);
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      drawing = false;
      lastX = null;
      lastY = null;
    });

    // Restart button
    restartBtn.addEventListener("click", () => {
      gameOver = false;
      message.textContent = "";
      restartBtn.style.display = "none";
      lastX = null;
      lastY = null;
      drawMaze();
    });
  </script>
</body>
</html>
