<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Maze Game — Simple</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --accent:#0b5a8a; --bg:#fff; --wall:#000; --start:#2ecc71; --exit:#e74c3c; --player:#0074d9; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      text-align: center;
      margin: 18px;
    }
    h1 { margin: 0 0 6px 0; color: #1a8a1a; }
    p.lead { margin: 6px 0 14px 0; color: #444; }

    .canvas-wrap { position: relative; display: inline-block; width: 100%; max-width: 600px; }
    canvas { display: block; border: 1px solid #222; background: var(--bg); width: 100%; height: auto; touch-action: none; }

    .hud {
      position: absolute;
      right: 8px;
      top: 8px;
      background: rgba(255,255,255,0.95);
      padding: 8px 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      font-weight: 700;
      color: var(--accent);
      text-align: left;
      min-width: 120px;
      z-index: 20;
    }
    .hud .line { font-size: 0.95rem; margin: 2px 0; }
    .hud .label { color: var(--accent); margin-right: 6px; }

    .instructions {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      max-width: 86%;
      text-align: left;
      line-height: 1.3;
      z-index: 30;
      display: none;
    }
    .controls { margin-top: 12px; }
    button {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #cfdfe8;
      background: #f3f7f3;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      margin: 0 6px;
    }
    #message { margin-top: 10px; min-height: 1.2em; font-weight:700; color: #c0392b; }

    @media (max-width:480px) {
      .hud { min-width: 96px; padding: 6px 8px; }
      .instructions { padding: 10px; }
    }
  </style>
</head>
<body>
  <h1>Maze Game — Simple</h1>
  <p class="lead">Click or touch the green start marker. Navigate to the correct red exit. Only one exit is correct.</p>

  <div class="canvas-wrap" id="wrap">
    <canvas id="mazeCanvas"></canvas>

    <div class="hud" id="hud" aria-hidden="false">
      <div class="line"><span class="label">Time</span><span id="timer">0.0s</span></div>
      <div class="line"><span class="label">Score</span><span id="score">0</span></div>
    </div>

    <div class="instructions" id="instructions" role="dialog" aria-modal="false">
      <strong style="color:#ffd966;display:block;margin-bottom:6px">How to play</strong>
      <div>Tap the <strong style="color:var(--start)">green</strong> start marker. Move the blue player to one of the two <strong style="color:var(--exit)">red</strong> exits. Only one exit is correct. Touching black walls ends the run.</div>
      <div style="text-align:right;margin-top:8px;">
        <button id="hideInstrBtn" style="background:#2ecc71;color:#fff;border:none;">Got it</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="restartBtn" hidden>Restart</button>
    <button id="showInstrBtn">Show Instructions</button>
  </div>

  <div id="message" role="status" aria-live="polite"></div>

  <script>
  (function () {
    // Responsive canvas setup
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('wrap');
    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restartBtn');
    const showInstrBtn = document.getElementById('showInstrBtn');
    const instructionsEl = document.getElementById('instructions');
    const hideInstrBtn = document.getElementById('hideInstrBtn');

    // Logical maze size
    const SIZE = 500;

    let DPR = window.devicePixelRatio || 1;
    let playing = false;
    let gameOver = false;
    let animId = null;

    // Player and target (logical coordinates)
    const player = { x: 30, y: 30, r: 10 }; // slightly larger player for easier navigation
    const target = { x: player.x, y: player.y };

    // Timer & score
    let startTime = null;
    let elapsed = 0;
    let score = 0;

    // Start marker (outside top-left)
    const startMarker = { x: 30, y: 30, r: 14 };

    // Two exits (only one correct)
    const exitA = { x: SIZE - 30, y: SIZE - 30, r: 14, correct: true };   // bottom-right (correct)
    const exitB = { x: 30, y: SIZE - 30, r: 14, correct: false };         // bottom-left (wrong)

    // Simpler maze: wider corridors, fewer obstacles, thicker gaps
    // Walls are rectangles in logical coordinates
    const walls = [
      // outer border
      { x: 0, y: 0, w: SIZE, h: 14 },
      { x: 0, y: 0, w: 14, h: SIZE },
      { x: SIZE - 14, y: 0, w: 14, h: SIZE },
      { x: 0, y: SIZE - 14, w: SIZE, h: 14 },

      // big inner frame (wide corridors)
      { x: 70, y: 70, w: 360, h: 14 },
      { x: 70, y: 70, w: 14, h: 360 },
      { x: 416, y: 70, w: 14, h: 360 },
      { x: 70, y: 416, w: 360, h: 14 },

      // a couple of gentle corridors (kept wide)
      { x: 120, y: 120, w: 260, h: 14 },
      { x: 120, y: 120, w: 14, h: 260 },
      { x: 366, y: 120, w: 14, h: 260 },
      { x: 120, y: 366, w: 260, h: 14 },

      // only two small blockers to create a choice, but wide spacing
      { x: 200, y: 120, w: 14, h: 80 },
      { x: 300, y: 300, w: 14, h: 80 },
    ];

    // Gaps for entry and exits (logical)
    const entryGap = { x: 14, y: 200, w: 80, h: 100 };   // left gap into interior (wider)
    const exitGap  = { x: SIZE - 94, y: 200, w: 80, h: 100 }; // right gap out (wider)

    // Resize canvas to fit wrapper width and keep square aspect ratio
    function resizeCanvas() {
      DPR = window.devicePixelRatio || 1;
      const displayWidth = wrap.clientWidth;
      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayWidth + 'px';
      canvas.width = Math.round(displayWidth * DPR);
      canvas.height = Math.round(displayWidth * DPR);
      const scale = canvas.width / SIZE;
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      redraw();
    }

    // Draw maze base (logical coords)
    function drawMazeBase() {
      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, SIZE, SIZE);

      ctx.fillStyle = '#000000';
      for (const w of walls) {
        ctx.fillRect(w.x, w.y, w.w, w.h);
      }

      // carve gaps (wider)
      ctx.clearRect(entryGap.x, entryGap.y, entryGap.w, entryGap.h);
      ctx.clearRect(exitGap.x, exitGap.y, exitGap.w, exitGap.h);
    }

    // Draw markers and player (no trail)
    function drawMarkersAndPlayer() {
      // start marker (green)
      ctx.fillStyle = '#2ecc71';
      ctx.beginPath();
      ctx.arc(startMarker.x, startMarker.y, startMarker.r, 0, Math.PI * 2);
      ctx.fill();

      // exit A (red)
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(exitA.x, exitA.y, exitA.r, 0, Math.PI * 2);
      ctx.fill();

      // exit B (red)
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(exitB.x, exitB.y, exitB.r, 0, Math.PI * 2);
      ctx.fill();

      // player
      if (playing) {
        ctx.fillStyle = '#0074d9';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function redraw() {
      drawMazeBase();
      drawMarkersAndPlayer();
    }

    // Forgiving collision detection:
    // sample a small square around center and only treat as collision when
    // a significant fraction of sampled pixels are black.
    function isTouchingWallForgiving(cx, cy, sampleSize = 6, threshold = 0.35) {
      // sampleSize in logical units; threshold is fraction of black pixels required to count as collision
      const half = Math.floor(sampleSize / 2);
      const backingScale = canvas.width / SIZE;
      const sx = Math.max(0, Math.floor((cx - half) * backingScale));
      const sy = Math.max(0, Math.floor((cy - half) * backingScale));
      const w = Math.min(Math.ceil(sampleSize * backingScale), canvas.width - sx);
      const h = Math.min(Math.ceil(sampleSize * backingScale), canvas.height - sy);
      if (w <= 0 || h <= 0) return false;
      try {
        // getImageData in logical coords by dividing by backingScale
        const data = ctx.getImageData(sx / backingScale, sy / backingScale, w / backingScale, h / backingScale).data;
        let black = 0;
        let total = data.length / 4;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
          if (r === 0 && g === 0 && b === 0 && a !== 0) black++;
        }
        // if black fraction exceeds threshold, count as collision
        return (black / total) >= threshold;
      } catch (err) {
        // fallback: single pixel check (very forgiving)
        try {
          const px = ctx.getImageData(Math.max(0, Math.floor(cx)), Math.max(0, Math.floor(cy)), 1, 1).data;
          return px[0] === 0 && px[1] === 0 && px[2] === 0;
        } catch (e) {
          return false;
        }
      }
    }

    // Smoothly move player toward target (logical coords)
    function updatePlayer() {
      const speed = 0.28; // slightly faster for responsiveness
      const prevX = player.x, prevY = player.y;
      player.x += (target.x - player.x) * speed;
      player.y += (target.y - player.y) * speed;
      const dx = player.x - prevX, dy = player.y - prevY;
      score += Math.sqrt(dx*dx + dy*dy);
    }

    // HUD update
    function updateHUD() {
      if (playing && startTime !== null) {
        elapsed = (Date.now() - startTime) / 1000;
      }
      timerEl.textContent = elapsed.toFixed(1) + 's';
      scoreEl.textContent = Math.round(score);
    }

    // Helpers
    function clientToLogical(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const cssX = clientX - rect.left;
      const cssY = clientY - rect.top;
      const logicalX = (cssX / rect.width) * SIZE;
      const logicalY = (cssY / rect.height) * SIZE;
      return { x: logicalX, y: logicalY };
    }

    function pointerOnStart(x, y) {
      return Math.hypot(x - startMarker.x, y - startMarker.y) <= startMarker.r + 8;
    }

    function reachedExit(exit) {
      return Math.hypot(player.x - exit.x, player.y - exit.y) <= (exit.r + player.r);
    }

    function startPlayingAt(pos) {
      playing = true;
      gameOver = false;
      messageEl.textContent = '';
      restartBtn.hidden = true;
      player.x = startMarker.x;
      player.y = startMarker.y;
      target.x = pos.x;
      target.y = pos.y;
      score = 0;
      elapsed = 0;
      startTime = Date.now();
      if (!animId) loop();
    }

    // Game loop
    function loop() {
      if (gameOver) {
        cancelAnimationFrame(animId);
        animId = null;
        return;
      }
      if (playing) {
        updatePlayer();

        // forgiving collision check
        if (isTouchingWallForgiving(player.x, player.y, 8, 0.40)) {
          messageEl.textContent = 'Oops! You hit a wall. Restart to try again.';
          gameOver = true;
          playing = false;
          restartBtn.hidden = false;
          cancelAnimationFrame(animId);
          animId = null;
          redraw();
          updateHUD();
          return;
        }

        // check exits
        if (reachedExit(exitA)) {
          if (exitA.correct) {
            updateHUD();
            window.location.href = 'address.html';
            return;
          } else {
            messageEl.textContent = 'Wrong exit. That one is incorrect. Restart to try again.';
            gameOver = true;
            playing = false;
            restartBtn.hidden = false;
            cancelAnimationFrame(animId);
            animId = null;
            redraw();
            updateHUD();
            return;
          }
        }

        if (reachedExit(exitB)) {
          if (exitB.correct) {
            updateHUD();
            window.location.href = 'address.html';
            return;
          } else {
            messageEl.textContent = 'Wrong exit. That one is incorrect. Restart to try again.';
            gameOver = true;
            playing = false;
            restartBtn.hidden = false;
            cancelAnimationFrame(animId);
            animId = null;
            redraw();
            updateHUD();
            return;
          }
        }
      }

      redraw();
      updateHUD();
      animId = requestAnimationFrame(loop);
    }

    // Mouse events
    canvas.addEventListener('mousedown', (e) => {
      if (gameOver) return;
      const pos = clientToLogical(e.clientX, e.clientY);
      if (pointerOnStart(pos.x, pos.y)) startPlayingAt(pos);
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!playing || gameOver) return;
      const pos = clientToLogical(e.clientX, e.clientY);
      target.x = pos.x;
      target.y = pos.y;
    });

    // Touch events (prevent default only while interacting)
    canvas.addEventListener('touchstart', (e) => {
      if (gameOver) return;
      e.preventDefault();
      const t = e.touches[0];
      const pos = clientToLogical(t.clientX, t.clientY);
      if (pointerOnStart(pos.x, pos.y)) startPlayingAt(pos);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!playing || gameOver) return;
      e.preventDefault();
      const t = e.touches[0];
      const pos = clientToLogical(t.clientX, t.clientY);
      target.x = pos.x;
      target.y = pos.y;
    }, { passive: false });

    // Restart
    restartBtn.addEventListener('click', () => {
      gameOver = false;
      playing = false;
      messageEl.textContent = '';
      restartBtn.hidden = true;
      score = 0;
      elapsed = 0;
      startTime = null;
      player.x = startMarker.x;
      player.y = startMarker.y;
      target.x = player.x;
      target.y = player.y;
      redraw();
      updateHUD();
    });

    // Instructions controls
    showInstrBtn.addEventListener('click', () => instructionsEl.style.display = 'block');
    hideInstrBtn.addEventListener('click', () => instructionsEl.style.display = 'none');

    // Resize handling
    window.addEventListener('resize', () => {
      clearTimeout(window._mazeResizeTimer);
      window._mazeResizeTimer = setTimeout(resizeCanvas, 80);
    });

    // Initial setup
    function init() {
      resizeCanvas();
      player.x = startMarker.x;
      player.y = startMarker.y;
      target.x = player.x;
      target.y = player.y;
      redraw();
      updateHUD();
      instructionsEl.style.display = 'block';
    }

    init();
  })();
  </script>
</body>
</html>
