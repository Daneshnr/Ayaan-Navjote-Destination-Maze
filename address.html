<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Secret Address — Geo Tag</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 80px 16px;
      color: #222;
    }
    h1 { color: #1a8a1a; margin-bottom: 0.25rem; }
    p { margin: 0.25rem 0; }
    .geo-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #f3f7f3;
      border: 1px solid #d6e6d6;
      cursor: pointer;
      text-decoration: none;
      color: #0b5a8a;
      font-weight: 600;
      margin-top: 12px;
    }
    .geo-tag:hover { background: #e9f3ea; }
    .icon {
      font-size: 1.25rem;
      line-height: 1;
    }
    .small {
      display: block;
      font-weight: 400;
      font-size: 0.9rem;
      color: #444;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>Congratulations!</h1>
  <p>You got the correct triangle.</p>
  <p>The secret location is:</p>

  <!-- Clickable geo tag: opens Google Maps -->
  <a id="geoLink" class="geo-tag" href="#" rel="noopener" target="_blank" aria-label="Open Seth Jeejeebhoy Dadabhoy Agiary in Google Maps">
    <span class="icon">🗺️</span>
    <span>
      Seth Jeejeebhoy Dadabhoy Agiary<br>
      <span class="small">Afghan Church, Pilot Bunder Road, Colaba, Mumbai-400005</span>
    </span>
  </a>

  <script>
    (function () {
      // The address to open in maps
      const address = 'Seth Jeejeebhoy Dadabhoy Agiary, Afghan Church, Pilot Bunder Road, Colaba, Mumbai-400005';

      // Google Maps web URL (works on desktop and mobile)
      const mapsWebUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);

      const link = document.getElementById('geoLink');
      link.href = mapsWebUrl;

      // On click, open Google Maps directly
      link.addEventListener('click', function (e) {
        e.preventDefault();
        window.open(mapsWebUrl, '_blank', 'noopener');
      });
    })();
  </script>
</body>
</html>
